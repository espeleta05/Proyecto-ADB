<!-- Fondo oscuro del modal -->
<div class="modal-overlay" id="patientModal">
    <div class="modal-container">
        
        <!-- Encabezado del Modal -->
        <div class="modal-header">
            <h3 class="modal-title">Nuevo paciente</h3>
            <button class="modal-close-btn" onclick="closePatientModal()">&times;</button>
        </div>

        <!-- Formulario -->
        <form id="formNewPatient" onsubmit="submitNewPatient(event)">
            
            <!-- Sección: Datos del Paciente -->
            <div class="form-section">
                <h4 class="section-title">DATOS PACIENTE</h4>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre del paciente</label>
                        <input type="text" id="p_name" placeholder="Nombre(s)" required>
                    </div>
                    <div class="form-group">
                        <label>Apellidos del paciente</label>
                        <input type="text" id="p_lastname" placeholder="Apellidos" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" id="p_birthdate" required>
                    </div>
                    <div class="form-group">
                        <label>Género</label>
                        <select id="p_gender" required>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de Sangre</label>
                        <select id="p_blood">
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Alergias</label>
                        <input type="text" id="p_allergies" placeholder="Ej: Penicilina">
                    </div>
                </div>
            </div>

            <!-- Sección: Datos del Tutor -->
            <div class="form-section">
                <h4 class="section-title">DATOS TUTOR</h4>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre del tutor</label>
                        <input type="text" id="t_name" placeholder="Nombre(s)">
                    </div>
                    <div class="form-group">
                        <label>Apellidos del tutor</label>
                        <input type="text" id="t_lastname" placeholder="Apellidos">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>CURP</label>
                        <input type="text" id="t_curp" placeholder="18 caracteres" maxlength="18">
                    </div>
                    <div class="form-group">
                        <label>Número de teléfono</label>
                        <input type="tel" id="t_phone" placeholder="+52 1234 5678">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="t_email" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="t_address" placeholder="Calle, Número, Colonia">
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closePatientModal()">Cancelar</button>
                <button type="submit" class="btn-save">Agregar paciente</button>
            </div>
        </form>
    </div>
</div>

<!-- Lógica JS del Modal -->
<script>
    // Función para abrir el modal
    function openPatientModal() {
        document.getElementById('patientModal').classList.add('active');
    }

    // Función para cerrar el modal
    function closePatientModal() {
        document.getElementById('patientModal').classList.remove('active');
        document.getElementById('formNewPatient').reset();
    }

    // Cerrar si da clic fuera
    document.getElementById('patientModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closePatientModal();
        }
    });

    // Función para enviar datos
    async function submitNewPatient(e) {
        e.preventDefault();

        const data = {
            first_name: document.getElementById('p_name').value,
            last_name: document.getElementById('p_lastname').value,
            birth_date: document.getElementById('p_birthdate').value,
            gender: document.getElementById('p_gender').value,
            blood_type: document.getElementById('p_blood').value,
            allergies: document.getElementById('p_allergies').value,
            
            tutor: {
                name: document.getElementById('t_name').value,
                lastname: document.getElementById('t_lastname').value,
                curp: document.getElementById('t_curp').value,
                number: document.getElementById('t_phone').value,
                mail: document.getElementById('t_email').value,
                address: document.getElementById('t_address').value
            }
        };

        try {
            const response = await fetch('/register_patient', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                alert(result.message || "Paciente registrado");
                closePatientModal();
                window.location.reload();
            } else {
                alert(result.error || "Ocurrió un error");
            }
        } catch (err) {
            console.error(err);
            alert("Error de conexión");
        }
    }
</script>
